<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffb3;stop-opacity:1" />
    </linearGradient>
  </defs>
  {/* DNA Double Helix structure */}
  <path d="M30,20 Q50,50 70,80" stroke="url(#grad)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M70,20 Q50,50 30,80" stroke="url(#grad)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  {/* Base Pair Connections */}
  <line x1="38" y1="31" x2="62" y2="31" stroke="#00f0ff" stroke-width="4" stroke-dasharray="2,4" />
  <line x1="44" y1="41" x2="56" y2="41" stroke="#00f0ff" stroke-width="4" stroke-dasharray="2,4" />
  <circle cx="50" cy="50" r="6" fill="#00ffb3" />
  <line x1="44" y1="59" x2="56" y2="59" stroke="#00ffb3" stroke-width="4" stroke-dasharray="2,4" />
  <line x1="38" y1="69" x2="62" y2="69" stroke="#00ffb3" stroke-width="4" stroke-dasharray="2,4" />
  
  {/* Glowing Orbit Ring */}
  <circle cx="50" cy="50" r="44" stroke="url(#grad)" stroke-width="4" fill="none" stroke-dasharray="8,12" opacity="0.8" />
</svg>